version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: medrush
      POSTGRES_PASSWORD: medrush_dev
      POSTGRES_DB: medrush_core
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/db_grants.sql:/docker-entrypoint-initdb.d/01_grants.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrush -d medrush_core"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # kafka:  # Uncomment when KAFKA_ENABLED=true
  #   image: confluentinc/cp-kafka:7.6.1
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
  #   ports:
  #     - "9092:9092"

volumes:
  pg_data:
